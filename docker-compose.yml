# =============================================================================
# 7.13 Logging: JSON file driver with rotation (referenced via x-logging anchor)
# 7.14 Network segmentation: frontend, backend, data networks
# =============================================================================

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  # ============================================================
  # Infrastructure
  # ============================================================

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: khushfus
      POSTGRES_USER: khushfus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-khushfus_dev}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U khushfus"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    <<: *logging
    networks:
      - data

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-khushfus-dev-redis}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    <<: *logging
    networks:
      - data

  opensearch:
    image: opensearchproject/opensearch:2.12.0
    environment:
      - discovery.type=single-node
      # WARNING: Enable security plugin in production (set DISABLE_SECURITY_PLUGIN=false)
      - DISABLE_SECURITY_PLUGIN=${DISABLE_SECURITY_PLUGIN:-false}
      # Production: set OPENSEARCH_HEAP="-Xms2g -Xmx2g" or higher. 512m is for dev only.
      - "OPENSEARCH_JAVA_OPTS=${OPENSEARCH_HEAP:--Xms512m -Xmx512m}"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: always
    <<: *logging
    networks:
      - data

  jaeger:
    image: jaegertracing/all-in-one:1.54
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    restart: always
    <<: *logging
    networks:
      - backend

  # ============================================================
  # Core Services (Phase 1)
  # ============================================================

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    command: uvicorn services.gateway.app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment: &common-env
      DATABASE_URL: postgresql+asyncpg://khushfus:${POSTGRES_PASSWORD:-khushfus_dev}@postgres:5432/khushfus
      REDIS_URL: redis://${REDIS_PASSWORD:+:$REDIS_PASSWORD@}redis:6379/0
      ELASTICSEARCH_URL: http://opensearch:9200
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-change-me}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET:-dev-webhook-secret}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-token}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    <<: *logging
    networks:
      - frontend
      - backend
      - data

  collector:
    build:
      context: .
      dockerfile: services/collector_service/Dockerfile
    volumes:
      - .:/app
    environment:
      <<: *common-env
      COLLECTION_INTERVAL: "3600"
      TWITTER_BEARER_TOKEN: ${TWITTER_BEARER_TOKEN:-}
      FACEBOOK_PAGE_ACCESS_TOKEN: ${FACEBOOK_PAGE_ACCESS_TOKEN:-}
      INSTAGRAM_ACCESS_TOKEN: ${INSTAGRAM_ACCESS_TOKEN:-}
      LINKEDIN_ACCESS_TOKEN: ${LINKEDIN_ACCESS_TOKEN:-}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      TIKTOK_ACCESS_TOKEN: ${TIKTOK_ACCESS_TOKEN:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_CHANNEL_IDS: ${DISCORD_CHANNEL_IDS:-}
      THREADS_ACCESS_TOKEN: ${THREADS_ACCESS_TOKEN:-}
      THREADS_USER_IDS: ${THREADS_USER_IDS:-me}
      BLUESKY_HANDLE: ${BLUESKY_HANDLE:-}
      BLUESKY_APP_PASSWORD: ${BLUESKY_APP_PASSWORD:-}
      PINTEREST_ACCESS_TOKEN: ${PINTEREST_ACCESS_TOKEN:-}
      APPLE_APP_IDS: ${APPLE_APP_IDS:-}
      PLAY_STORE_PACKAGES: ${PLAY_STORE_PACKAGES:-}
      TRUSTPILOT_API_KEY: ${TRUSTPILOT_API_KEY:-}
      TRUSTPILOT_BUSINESS_IDS: ${TRUSTPILOT_BUSINESS_IDS:-}
      YELP_API_KEY: ${YELP_API_KEY:-}
      YELP_BUSINESS_IDS: ${YELP_BUSINESS_IDS:-}
      G2_PRODUCT_URLS: ${G2_PRODUCT_URLS:-}
      MASTODON_INSTANCE_URL: ${MASTODON_INSTANCE_URL:-https://mastodon.social}
      MASTODON_ACCESS_TOKEN: ${MASTODON_ACCESS_TOKEN:-}
      LISTEN_NOTES_API_KEY: ${LISTEN_NOTES_API_KEY:-}
      PODCAST_INDEX_API_KEY: ${PODCAST_INDEX_API_KEY:-}
      PODCAST_INDEX_API_SECRET: ${PODCAST_INDEX_API_SECRET:-}
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f python || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    <<: *logging
    networks:
      - backend
      - data

  analyzer:
    build:
      context: .
      dockerfile: services/analyzer_service/Dockerfile
    volumes:
      - .:/app
    environment:
      <<: *common-env
      SENTIMENT_MODEL: hybrid
      USE_GPU: "false"
      ANALYZER_BATCH_SIZE: "20"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f python || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 1G
    depends_on:
      redis: { condition: service_healthy }
    restart: unless-stopped
    <<: *logging
    networks:
      - backend
      - data

  query:
    build:
      context: .
      dockerfile: services/query_service/Dockerfile
    volumes:
      - .:/app
    environment:
      <<: *common-env
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f python || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      opensearch: { condition: service_healthy }
    restart: unless-stopped
    <<: *logging
    networks:
      - backend
      - data

  report:
    build:
      context: .
      dockerfile: services/report_service/Dockerfile
    volumes:
      - .:/app
      - reports_output:/app/reports_output
    environment:
      <<: *common-env
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f python || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    <<: *logging
    networks:
      - backend
      - data

  notification:
    build:
      context: .
      dockerfile: services/notification_service/Dockerfile
    volumes:
      - .:/app
    environment:
      <<: *common-env
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f python || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 256M
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    <<: *logging
    networks:
      - backend
      - data

  # ============================================================
  # Phase 2: Enterprise-Ready
  # ============================================================

  identity:
    build:
      context: .
      dockerfile: services/identity_service/Dockerfile
    command: uvicorn services.identity_service.app.main:app --host 0.0.0.0 --port 8010
    ports:
      - "8010:8010"
    volumes:
      - .:/app
    environment:
      <<: *common-env
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8010/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 256M
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
