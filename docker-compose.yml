      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 1G
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    <<: *logging
    networks:
      - backend
      - data

  search:
    build:
      context: .
      dockerfile: services/search_service/Dockerfile
    command: uvicorn services.search_service.app.main:app --host 0.0.0.0 --port 8012
    ports:
      - "8012:8012"
    volumes:
      - .:/app
    environment:
      <<: *common-env
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8012/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
    depends_on:
      opensearch: { condition: service_healthy }
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    <<: *logging
    networks:
      - backend
      - data

  # ============================================================
  # Phase 3: Competitive Parity
  # ============================================================

  publishing:
    build:
      context: .
      dockerfile: services/publishing_service/Dockerfile
    command: uvicorn services.publishing_service.app.main:app --host 0.0.0.0 --port 8013
    ports:
      - "8013:8013"
    volumes:
      - .:/app
    environment:
      <<: *common-env
      TWITTER_BEARER_TOKEN: ${TWITTER_BEARER_TOKEN:-}
      FACEBOOK_PAGE_ACCESS_TOKEN: ${FACEBOOK_PAGE_ACCESS_TOKEN:-}
      LINKEDIN_ACCESS_TOKEN: ${LINKEDIN_ACCESS_TOKEN:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8013/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 256M
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    <<: *logging
    networks:
      - backend
      - data

  rate-limiter:
    build:
      context: .
      dockerfile: services/rate_limiter_service/Dockerfile
    command: uvicorn services.rate_limiter_service.app.main:app --host 0.0.0.0 --port 8014
    ports:
      - "8014:8014"
    volumes:
      - .:/app
    environment:
      <<: *common-env
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8014/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 256M
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    restart: unless-stopped
    <<: *logging
    networks:
      - backend
      - data

  enrichment:
    build:
      context: .
      dockerfile: services/enrichment_service/Dockerfile
    volumes:
      - .:/app
    environment:
      <<: *common-env
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f python || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    <<: *logging
    networks:
      - backend
      - data

  export:
    build:
      context: .
      dockerfile: services/export_service/Dockerfile
    command: uvicorn services.export_service.app.main:app --host 0.0.0.0 --port 8015
    ports:
      - "8015:8015"
    volumes:
      - .:/app
      - exports_output:/app/exports_output
    environment:
      <<: *common-env
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8015/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    <<: *logging
    networks:
      - backend
      - data

  # ============================================================
  # Phase 4: Differentiation
  # ============================================================

  competitive:
    build:
      context: .
      dockerfile: services/competitive_service/Dockerfile
    command: uvicorn services.competitive_service.app.main:app --host 0.0.0.0 --port 8016
    ports:
      - "8016:8016"
    volumes:
      - .:/app
    environment:
      <<: *common-env
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8016/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 256M
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    <<: *logging
    networks:
      - backend
      - data

  scheduler:
    build:
      context: .
      dockerfile: services/scheduler_service/Dockerfile
    command: uvicorn services.scheduler_service.app.main:app --host 0.0.0.0 --port 8017
    ports:
      - "8017:8017"
    volumes:
      - .:/app
    environment:
      <<: *common-env
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8017/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 256M
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    <<: *logging
    networks:
      - backend
      - data

  audit:
    build:
      context: .
      dockerfile: services/audit_service/Dockerfile
    command: uvicorn services.audit_service.app.main:app --host 0.0.0.0 --port 8018
    ports:
      - "8018:8018"
    volumes:
      - .:/app
    environment:
      <<: *common-env
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8018/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 256M
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    <<: *logging
    networks:
      - backend
      - data

  realtime:
    build:
      context: .
      dockerfile: services/realtime_service/Dockerfile
    command: uvicorn services.realtime_service.app.main:app --host 0.0.0.0 --port 8019
    ports:
      - "8019:8019"
    volumes:
      - .:/app
    environment:
      <<: *common-env
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8019/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 256M
    depends_on:
      redis: { condition: service_healthy }
    restart: unless-stopped
    <<: *logging
    networks:
      - backend
      - data

  project:
    build:
      context: .
      dockerfile: services/project_service/Dockerfile
    command: uvicorn services.project_service.app.main:app --host 0.0.0.0 --port 8020
    ports:
      - "8020:8020"
    volumes:
      - .:/app
    environment:
      <<: *common-env
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8020/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 256M
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    <<: *logging
    networks:
      - backend
      - data

  # ============================================================
  # Frontend
  # ============================================================

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://gateway:8000
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 256M
    depends_on:
      - gateway
    restart: unless-stopped
    <<: *logging
    networks:
      - frontend

  # ============================================================
  # Monitoring
  # ============================================================

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./deploy/monitoring/prometheus-business-rules.yml:/etc/prometheus/prometheus-business-rules.yml
      - ./deploy/monitoring/prometheus-alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      # Production: 90d retention. Adjust based on disk space (~2 bytes/sample).
      # For 15s scrape interval with 13 targets, ~90d needs ~15-20GB.
      - '--storage.tsdb.retention.time=90d'
    restart: unless-stopped
    <<: *logging
    networks:
      - backend

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-khushfus}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./deploy/monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    <<: *logging
    networks:
      - backend

volumes:
  postgres_data:
  redis_data:
  es_data:
  reports_output:
  exports_output:
  prometheus_data:
  grafana_data:

# 7.14 Network segmentation
networks:
  frontend:
    driver: bridge
    name: khushfus-frontend
  backend:
    driver: bridge
    name: khushfus-backend
  data:
    driver: bridge
    name: khushfus-data
