services:
  # ============================================================
  # Infrastructure
  # ============================================================

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: khushfus
      POSTGRES_USER: khushfus
      POSTGRES_PASSWORD: khushfus_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U khushfus"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.12.0
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 10s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:1.54
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  # ============================================================
  # Core Services (Phase 1)
  # ============================================================

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    command: uvicorn services.gateway.app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment: &common-env
      DATABASE_URL: postgresql+asyncpg://khushfus:khushfus_dev@postgres:5432/khushfus
      REDIS_URL: redis://redis:6379/0
      ELASTICSEARCH_URL: http://opensearch:9200
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET:-dev-webhook-secret}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-token}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  collector:
    build:
      context: .
      dockerfile: services/collector_service/Dockerfile
    volumes:
      - .:/app
    environment:
      <<: *common-env
      COLLECTION_INTERVAL: "3600"
      TWITTER_BEARER_TOKEN: ${TWITTER_BEARER_TOKEN:-}
      FACEBOOK_PAGE_ACCESS_TOKEN: ${FACEBOOK_PAGE_ACCESS_TOKEN:-}
      INSTAGRAM_ACCESS_TOKEN: ${INSTAGRAM_ACCESS_TOKEN:-}
      LINKEDIN_ACCESS_TOKEN: ${LINKEDIN_ACCESS_TOKEN:-}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      TIKTOK_ACCESS_TOKEN: ${TIKTOK_ACCESS_TOKEN:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_CHANNEL_IDS: ${DISCORD_CHANNEL_IDS:-}
      THREADS_ACCESS_TOKEN: ${THREADS_ACCESS_TOKEN:-}
      THREADS_USER_IDS: ${THREADS_USER_IDS:-me}
      BLUESKY_HANDLE: ${BLUESKY_HANDLE:-}
      BLUESKY_APP_PASSWORD: ${BLUESKY_APP_PASSWORD:-}
      PINTEREST_ACCESS_TOKEN: ${PINTEREST_ACCESS_TOKEN:-}
      APPLE_APP_IDS: ${APPLE_APP_IDS:-}
      PLAY_STORE_PACKAGES: ${PLAY_STORE_PACKAGES:-}
      TRUSTPILOT_API_KEY: ${TRUSTPILOT_API_KEY:-}
      TRUSTPILOT_BUSINESS_IDS: ${TRUSTPILOT_BUSINESS_IDS:-}
      YELP_API_KEY: ${YELP_API_KEY:-}
      YELP_BUSINESS_IDS: ${YELP_BUSINESS_IDS:-}
      G2_PRODUCT_URLS: ${G2_PRODUCT_URLS:-}
      MASTODON_INSTANCE_URL: ${MASTODON_INSTANCE_URL:-https://mastodon.social}
      MASTODON_ACCESS_TOKEN: ${MASTODON_ACCESS_TOKEN:-}
      LISTEN_NOTES_API_KEY: ${LISTEN_NOTES_API_KEY:-}
      PODCAST_INDEX_API_KEY: ${PODCAST_INDEX_API_KEY:-}
      PODCAST_INDEX_API_SECRET: ${PODCAST_INDEX_API_SECRET:-}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  analyzer:
    build:
      context: .
      dockerfile: services/analyzer_service/Dockerfile
    volumes:
      - .:/app
    environment:
      <<: *common-env
      SENTIMENT_MODEL: hybrid
      USE_GPU: "false"
      ANALYZER_BATCH_SIZE: "20"
    depends_on:
      redis: { condition: service_healthy }
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - { driver: nvidia, count: 1, capabilities: [gpu] }

  query:
    build:
      context: .
      dockerfile: services/query_service/Dockerfile
    volumes:
      - .:/app
    environment:
      <<: *common-env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      opensearch: { condition: service_healthy }

  report:
    build:
      context: .
      dockerfile: services/report_service/Dockerfile
    volumes:
      - .:/app
      - reports_output:/app/reports_output
    environment:
      <<: *common-env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  notification:
    build:
      context: .
      dockerfile: services/notification_service/Dockerfile
    volumes:
      - .:/app
    environment:
      <<: *common-env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  # ============================================================
  # Phase 2: Enterprise-Ready
  # ============================================================

  identity:
    build:
      context: .
      dockerfile: services/identity_service/Dockerfile
    command: uvicorn services.identity_service.app.main:app --host 0.0.0.0 --port 8010 --reload
    ports:
      - "8010:8010"
    volumes:
      - .:/app
    environment:
      <<: *common-env
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  tenant:
    build:
      context: .
      dockerfile: services/tenant_service/Dockerfile
    command: uvicorn services.tenant_service.app.main:app --host 0.0.0.0 --port 8011 --reload
    ports:
      - "8011:8011"
    volumes:
      - .:/app
    environment:
      <<: *common-env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  media:
    build:
      context: .
      dockerfile: services/media_service/Dockerfile
    volumes:
      - .:/app
    environment:
      <<: *common-env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - { driver: nvidia, count: 1, capabilities: [gpu] }

  search:
    build:
      context: .
      dockerfile: services/search_service/Dockerfile
    command: uvicorn services.search_service.app.main:app --host 0.0.0.0 --port 8012 --reload
    ports:
      - "8012:8012"
    volumes:
      - .:/app
    environment:
      <<: *common-env
    depends_on:
      opensearch: { condition: service_healthy }
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  # ============================================================
  # Phase 3: Competitive Parity
  # ============================================================

  publishing:
    build:
      context: .
      dockerfile: services/publishing_service/Dockerfile
    command: uvicorn services.publishing_service.app.main:app --host 0.0.0.0 --port 8013 --reload
    ports:
      - "8013:8013"
    volumes:
      - .:/app
    environment:
      <<: *common-env
      TWITTER_BEARER_TOKEN: ${TWITTER_BEARER_TOKEN:-}
      FACEBOOK_PAGE_ACCESS_TOKEN: ${FACEBOOK_PAGE_ACCESS_TOKEN:-}
      LINKEDIN_ACCESS_TOKEN: ${LINKEDIN_ACCESS_TOKEN:-}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  rate-limiter:
    build:
      context: .
      dockerfile: services/rate_limiter_service/Dockerfile
    command: uvicorn services.rate_limiter_service.app.main:app --host 0.0.0.0 --port 8014 --reload
    ports:
      - "8014:8014"
    volumes:
      - .:/app
    environment:
      <<: *common-env
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }

  enrichment:
    build:
      context: .
      dockerfile: services/enrichment_service/Dockerfile
    volumes:
      - .:/app
    environment:
      <<: *common-env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  export:
    build:
      context: .
      dockerfile: services/export_service/Dockerfile
    command: uvicorn services.export_service.app.main:app --host 0.0.0.0 --port 8015 --reload
    ports:
      - "8015:8015"
    volumes:
      - .:/app
      - exports_output:/app/exports_output
    environment:
      <<: *common-env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  # ============================================================
  # Phase 4: Differentiation
  # ============================================================

  competitive:
    build:
      context: .
      dockerfile: services/competitive_service/Dockerfile
    command: uvicorn services.competitive_service.app.main:app --host 0.0.0.0 --port 8016 --reload
    ports:
      - "8016:8016"
    volumes:
      - .:/app
    environment:
      <<: *common-env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  scheduler:
    build:
      context: .
      dockerfile: services/scheduler_service/Dockerfile
    command: uvicorn services.scheduler_service.app.main:app --host 0.0.0.0 --port 8017 --reload
    ports:
      - "8017:8017"
    volumes:
      - .:/app
    environment:
      <<: *common-env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  audit:
    build:
      context: .
      dockerfile: services/audit_service/Dockerfile
    command: uvicorn services.audit_service.app.main:app --host 0.0.0.0 --port 8018 --reload
    ports:
      - "8018:8018"
    volumes:
      - .:/app
    environment:
      <<: *common-env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  realtime:
    build:
      context: .
      dockerfile: services/realtime_service/Dockerfile
    command: uvicorn services.realtime_service.app.main:app --host 0.0.0.0 --port 8019 --reload
    ports:
      - "8019:8019"
    volumes:
      - .:/app
    environment:
      <<: *common-env
    depends_on:
      redis: { condition: service_healthy }

  project:
    build:
      context: .
      dockerfile: services/project_service/Dockerfile
    command: uvicorn services.project_service.app.main:app --host 0.0.0.0 --port 8020 --reload
    ports:
      - "8020:8020"
    volumes:
      - .:/app
    environment:
      <<: *common-env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  # ============================================================
  # Frontend
  # ============================================================

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://gateway:8000
    depends_on:
      - gateway

  # ============================================================
  # Monitoring
  # ============================================================

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=khushfus
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./deploy/monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  es_data:
  reports_output:
  exports_output:
  prometheus_data:
  grafana_data:
