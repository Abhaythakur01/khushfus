# =============================================================================
# KhushFus GitLab CI/CD Pipeline
# =============================================================================
# Multi-stage pipeline: lint -> test -> security -> build -> deploy
# =============================================================================

stages:
  - lint
  - test
  - integration-test
  - security
  - build
  - post-build
  - deploy-staging
  - deploy-production
  - release

# ---------------------------------------------------------------------------
# Global variables
# ---------------------------------------------------------------------------
variables:
  DOCKER_REGISTRY: $CI_REGISTRY
  DOCKER_IMAGE_PREFIX: $CI_REGISTRY_IMAGE
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  POSTGRES_DB: khushfus_test
  POSTGRES_USER: khushfus
  POSTGRES_PASSWORD: khushfus_test
  DATABASE_URL: "postgresql+asyncpg://khushfus:khushfus_test@postgres:5432/khushfus_test"
  REDIS_URL: "redis://redis:6379/0"
  PYTHONPATH: "."

# ---------------------------------------------------------------------------
# Cache pip downloads and node_modules
# ---------------------------------------------------------------------------
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .pip-cache/
    - frontend/node_modules/

# =============================================================================
# Stage: lint
# =============================================================================

lint-python:
  stage: lint
  image: python:3.11-slim
  before_script:
    - pip install --cache-dir $PIP_CACHE_DIR ruff>=0.3.0
  script:
    - ruff check src/ services/ shared/ tests/
    - ruff format --check src/ services/ shared/ tests/

lint-frontend:
  stage: lint
  image: node:20-alpine
  script:
    - cd frontend && npm ci && npm run lint

# ---------------------------------------------------------------------------
# 8.4: mypy type checking — start lenient (allow_failure: true)
# ---------------------------------------------------------------------------
type-check:
  stage: lint
  image: python:3.11-slim
  before_script:
    - pip install --cache-dir $PIP_CACHE_DIR mypy>=1.14.0
  script:
    - mypy src/ shared/ --ignore-missing-imports --no-error-summary
  allow_failure: true

# =============================================================================
# Stage: test
# =============================================================================

test-python:
  stage: test
  image: python:3.11-slim
  services:
    - postgres:16-alpine
    - redis:7-alpine
  before_script:
    - apt-get update -qq && apt-get install -y -qq gcc libpq-dev > /dev/null
    - pip install --cache-dir $PIP_CACHE_DIR -e ".[dev]"
  script:
    - pytest tests/ -v --cov=src --cov=services --cov=shared --cov-report=xml --cov-report=term
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 30 days
  coverage: '/TOTAL.*\s+(\d+%)$/'

test-frontend:
  stage: test
  image: node:20-alpine
  script:
    - cd frontend && npm ci && npm run build && npm test -- --passWithNoTests

test-migrations:
  stage: test
  image: python:3.11-slim
  services:
    - postgres:16-alpine
  before_script:
    - apt-get update -qq && apt-get install -y -qq gcc libpq-dev > /dev/null
    - pip install --cache-dir $PIP_CACHE_DIR -e .
  script:
    - alembic upgrade head
    - alembic downgrade base
    - alembic upgrade head

# ---------------------------------------------------------------------------
# 7.42: Migration dry-run — verify migrations generate valid SQL without applying
# ---------------------------------------------------------------------------
migration-dry-run:
  stage: test
  image: python:3.11-slim
  before_script:
    - apt-get update -qq && apt-get install -y -qq gcc libpq-dev > /dev/null
    - pip install --cache-dir $PIP_CACHE_DIR -e .
  script:
    - echo "Generating migration SQL (dry-run)..."
    - alembic upgrade head --sql > migration-dry-run.sql
    - echo "Migration SQL generated successfully ($(wc -l < migration-dry-run.sql) lines)"
    - head -50 migration-dry-run.sql
  artifacts:
    paths:
      - migration-dry-run.sql
    expire_in: 7 days
  allow_failure: true

# =============================================================================
# 8.14: Mutation testing — only on schedules, allow_failure: true
# =============================================================================

mutation-test:
  stage: test
  image: python:3.11-slim
  before_script:
    - apt-get update -qq && apt-get install -y -qq gcc libpq-dev > /dev/null
    - pip install --cache-dir $PIP_CACHE_DIR -e ".[dev]" mutmut
  script:
    - echo "Running mutation tests on src/ and shared/..."
    - mutmut run --paths-to-mutate src/,shared/ --tests-dir tests/ || true
    - mutmut results
  artifacts:
    paths:
      - .mutmut-cache
    expire_in: 7 days
  allow_failure: true
  only:
    - schedules

# =============================================================================
# 7.27 Dependency lock file verification
# =============================================================================

verify-python-deps:
  stage: test
  image: python:3.11-slim
  before_script:
    - apt-get update -qq && apt-get install -y -qq gcc libpq-dev > /dev/null
    - pip install --cache-dir $PIP_CACHE_DIR -r requirements.txt
  script:
    - echo "Verifying Python dependency lock consistency..."
    - pip freeze > /tmp/installed.txt
    - |
      # Check that all pinned requirements are installed at the correct version
      while IFS= read -r line; do
        # Skip comments, empty lines, and editable installs
        [[ "$line" =~ ^#.*$ || -z "$line" || "$line" =~ ^-e ]] && continue
        pkg=$(echo "$line" | cut -d'=' -f1 | cut -d'>' -f1 | cut -d'<' -f1 | tr '[:upper:]' '[:lower:]' | tr '_' '-')
        if ! grep -qi "^${pkg}" /tmp/installed.txt; then
          echo "WARNING: $pkg from requirements.txt not found in installed packages"
        fi
      done < requirements.txt
    - echo "Python dependency verification complete"

verify-frontend-deps:
  stage: test
  image: node:20-alpine
  script:
    - cd frontend
    - echo "Verifying package-lock.json is up to date..."
    - npm ci
    - echo "Frontend dependency verification complete (npm ci succeeded)"

# =============================================================================
# 7.24 Integration test stage
# =============================================================================

integration-test:
  stage: integration-test
  image: python:3.11-slim
  services:
    - postgres:16-alpine
    - redis:7-alpine
  before_script:
    - apt-get update -qq && apt-get install -y -qq gcc libpq-dev > /dev/null
    - pip install --cache-dir $PIP_CACHE_DIR -e ".[dev]"
  script:
    - echo "Running full integration test suite..."
    - make test-all
  artifacts:
    reports:
      junit: test-results.xml
    expire_in: 30 days
  allow_failure: true

# =============================================================================
# Stage: security
# =============================================================================

include:
  - template: Security/SAST.gitlab-ci.yml

dependency-scan:
  stage: security
  image: python:3.11-slim
  allow_failure: true
  before_script:
    - pip install --cache-dir $PIP_CACHE_DIR pip-audit
  script:
    - pip-audit -r requirements.txt || true
    - |
      for svc_dir in services/*/; do
        if [ -f "${svc_dir}requirements.txt" ]; then
          echo "--- Auditing ${svc_dir}requirements.txt ---"
          pip-audit -r "${svc_dir}requirements.txt" || true
        fi
      done

container-scan:
  stage: post-build
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  allow_failure: false
  variables:
    TRIVY_NO_PROGRESS: "true"
    TRIVY_CACHE_DIR: "$CI_PROJECT_DIR/.trivy-cache"
  script:
    - trivy image --exit-code 1 --severity HIGH,CRITICAL $DOCKER_IMAGE_PREFIX/gateway:${CI_COMMIT_SHA}
  only:
    - main
    - develop
    - tags
  needs:
    - build-services

# =============================================================================
# Stage: build
# =============================================================================

# ---------------------------------------------------------------------------
# Build all backend services via parallel matrix
# ---------------------------------------------------------------------------
build-services:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  parallel:
    matrix:
      - SERVICE:
          - gateway
          - collector_service
          - analyzer_service
          - query_service
          - report_service
          - notification_service
          - identity_service
          - tenant_service
          - media_service
          - search_service
          - publishing_service
          - rate_limiter_service
          - enrichment_service
          - export_service
          - competitive_service
          - scheduler_service
          - audit_service
          - realtime_service
          - project_service
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - SERVICE_NAME=$(echo $SERVICE | sed 's/_service//')
    - |
      docker build \
        -t $DOCKER_IMAGE_PREFIX/${SERVICE_NAME}:${CI_COMMIT_SHA} \
        -t $DOCKER_IMAGE_PREFIX/${SERVICE_NAME}:latest \
        -f services/${SERVICE}/Dockerfile .
    - docker push $DOCKER_IMAGE_PREFIX/${SERVICE_NAME}:${CI_COMMIT_SHA}
    - docker push $DOCKER_IMAGE_PREFIX/${SERVICE_NAME}:latest
  only:
    - main
    - develop
    - tags

# ---------------------------------------------------------------------------
# Build frontend
# ---------------------------------------------------------------------------
build-frontend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      docker build \
        -t $DOCKER_IMAGE_PREFIX/frontend:${CI_COMMIT_SHA} \
        -t $DOCKER_IMAGE_PREFIX/frontend:latest \
        -f frontend/Dockerfile ./frontend
    - docker push $DOCKER_IMAGE_PREFIX/frontend:${CI_COMMIT_SHA}
    - docker push $DOCKER_IMAGE_PREFIX/frontend:latest
  only:
    - main
    - develop
    - tags

# ---------------------------------------------------------------------------
# 7.26 SBOM generation
# ---------------------------------------------------------------------------
generate-sbom:
  stage: build
  image: python:3.11-slim
  before_script:
    - pip install --cache-dir $PIP_CACHE_DIR cyclonedx-bom
  script:
    - echo "Generating Software Bill of Materials (SBOM)..."
    - cyclonedx-py requirements -i requirements.txt -o sbom-backend.json --format json || true
    - |
      # Generate SBOMs for each service
      for svc_dir in services/*/; do
        if [ -f "${svc_dir}requirements.txt" ]; then
          svc_name=$(basename "$svc_dir")
          echo "--- Generating SBOM for ${svc_name} ---"
          cyclonedx-py requirements -i "${svc_dir}requirements.txt" -o "sbom-${svc_name}.json" --format json || true
        fi
      done
    - echo "SBOM generation complete"
  artifacts:
    paths:
      - sbom-*.json
    expire_in: 90 days
  only:
    - main
    - develop
    - tags

generate-sbom-frontend:
  stage: build
  image: node:20-alpine
  before_script:
    - npm install -g @cyclonedx/cyclonedx-npm
  script:
    - cd frontend
    - npm ci
    - cyclonedx-npm --output-file ../sbom-frontend.json || true
    - echo "Frontend SBOM generation complete"
  artifacts:
    paths:
      - sbom-frontend.json
    expire_in: 90 days
  only:
    - main
    - develop
    - tags

# =============================================================================
# Stage: deploy-staging
# =============================================================================

deploy-staging:
  stage: deploy-staging
  image: bitnami/kubectl:latest
  environment:
    name: staging
    url: https://staging.khushfus.com
  before_script:
    - kubectl config use-context $KUBE_CONTEXT_STAGING
  script:
    - chmod +x deploy/deploy.sh
    - ./deploy/deploy.sh staging
  only:
    - develop
  when: manual

# =============================================================================
# Stage: deploy-production
# =============================================================================

deploy-production:
  stage: deploy-production
  image: bitnami/kubectl:latest
  environment:
    name: production
    url: https://app.khushfus.com
  before_script:
    - kubectl config use-context $KUBE_CONTEXT_PRODUCTION
  script:
    - chmod +x deploy/deploy.sh
    - ./deploy/deploy.sh production
  only:
    - main
    - tags
  when: manual

# =============================================================================
# Stage: release
# =============================================================================
# 7.43: Automated release notes from conventional commits between tags

generate-release-notes:
  stage: release
  image: alpine:3.19
  before_script:
    - apk add --no-cache git
  script:
    - |
      # Determine the previous tag
      PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
      CURRENT_TAG=${CI_COMMIT_TAG}

      if [ -z "$PREV_TAG" ]; then
        echo "No previous tag found, generating notes from all commits"
        RANGE="HEAD"
      else
        echo "Generating release notes from ${PREV_TAG} to ${CURRENT_TAG}"
        RANGE="${PREV_TAG}..HEAD"
      fi

      # Parse conventional commits into categories
      echo "# Release ${CURRENT_TAG}" > RELEASE_NOTES.md
      echo "" >> RELEASE_NOTES.md
      echo "## Changes" >> RELEASE_NOTES.md
      echo "" >> RELEASE_NOTES.md

      # Features
      FEATURES=$(git log --oneline ${RANGE} --grep="^feat" --format="- %s (%h)" 2>/dev/null || true)
      if [ -n "$FEATURES" ]; then
        echo "### Features" >> RELEASE_NOTES.md
        echo "$FEATURES" >> RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md
      fi

      # Bug fixes
      FIXES=$(git log --oneline ${RANGE} --grep="^fix" --format="- %s (%h)" 2>/dev/null || true)
      if [ -n "$FIXES" ]; then
        echo "### Bug Fixes" >> RELEASE_NOTES.md
        echo "$FIXES" >> RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md
      fi

      # Security
      SECURITY=$(git log --oneline ${RANGE} --grep="^security" --format="- %s (%h)" 2>/dev/null || true)
      if [ -n "$SECURITY" ]; then
        echo "### Security" >> RELEASE_NOTES.md
        echo "$SECURITY" >> RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md
      fi

      # Other changes
      OTHER=$(git log --oneline ${RANGE} --format="- %s (%h)" | grep -v -E "^- (feat|fix|security)" || true)
      if [ -n "$OTHER" ]; then
        echo "### Other" >> RELEASE_NOTES.md
        echo "$OTHER" >> RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md
      fi

      echo "---" >> RELEASE_NOTES.md
      echo "Full changelog: ${PREV_TAG}...${CURRENT_TAG}" >> RELEASE_NOTES.md

      cat RELEASE_NOTES.md
  artifacts:
    paths:
      - RELEASE_NOTES.md
    expire_in: 90 days
  only:
    - tags
