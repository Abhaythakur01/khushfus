# =============================================================================
# 7.30 SLO/SLI Definitions for KhushFus Platform
# =============================================================================
# These SLOs define the reliability targets for key services.
# Use these definitions to configure Prometheus recording rules and alerts.
# =============================================================================

slos:
  # ---------------------------------------------------------------------------
  # Gateway API Service
  # ---------------------------------------------------------------------------
  - name: gateway-availability
    service: gateway
    description: "Gateway API availability"
    sli:
      type: availability
      metric: |
        1 - (
          sum(rate(http_requests_total{job="gateway",status=~"5.."}[5m]))
          /
          sum(rate(http_requests_total{job="gateway"}[5m]))
        )
    objective: 99.9   # 99.9% availability
    window: 30d        # Rolling 30-day window
    error_budget: 0.1  # 0.1% error budget (~43 min/month)
    alerts:
      - burn_rate: 14.4  # 1h budget consumption alert
        window: 1h
        severity: critical
      - burn_rate: 6     # 6h budget consumption alert
        window: 6h
        severity: critical
      - burn_rate: 3     # 3d budget consumption alert
        window: 3d
        severity: warning

  - name: gateway-latency
    service: gateway
    description: "Gateway API response latency"
    sli:
      type: latency
      metric: |
        histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="gateway"}[5m])) by (le))
    objective_ms: 500  # p95 latency < 500ms
    window: 30d

  # ---------------------------------------------------------------------------
  # Collection Pipeline (end-to-end)
  # ---------------------------------------------------------------------------
  - name: collection-pipeline-latency
    service: collection-pipeline
    description: "End-to-end collection pipeline latency (collect -> analyze -> store)"
    sli:
      type: latency
      metric: |
        histogram_quantile(0.95,
          sum(rate(pipeline_end_to_end_duration_seconds_bucket[5m])) by (le)
        )
    objective_ms: 300000  # < 5 minutes (300s) end-to-end
    window: 30d

  - name: collection-pipeline-success
    service: collection-pipeline
    description: "Collection pipeline processing success rate"
    sli:
      type: availability
      metric: |
        1 - (
          sum(rate(pipeline_messages_failed_total[5m]))
          /
          sum(rate(pipeline_messages_processed_total[5m]))
        )
    objective: 99.5   # 99.5% of messages processed successfully
    window: 30d

  # ---------------------------------------------------------------------------
  # Search Service
  # ---------------------------------------------------------------------------
  - name: search-latency
    service: search
    description: "Search API response latency"
    sli:
      type: latency
      metric: |
        histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="search"}[5m])) by (le))
    objective_ms: 200  # p95 latency < 200ms
    window: 30d

  - name: search-availability
    service: search
    description: "Search API availability"
    sli:
      type: availability
      metric: |
        1 - (
          sum(rate(http_requests_total{job="search",status=~"5.."}[5m]))
          /
          sum(rate(http_requests_total{job="search"}[5m]))
        )
    objective: 99.9   # 99.9% availability
    window: 30d

  # ---------------------------------------------------------------------------
  # Identity Service (auth-critical)
  # ---------------------------------------------------------------------------
  - name: identity-availability
    service: identity
    description: "Identity/auth service availability"
    sli:
      type: availability
      metric: |
        1 - (
          sum(rate(http_requests_total{job="identity",status=~"5.."}[5m]))
          /
          sum(rate(http_requests_total{job="identity"}[5m]))
        )
    objective: 99.95  # Auth must be highly available
    window: 30d

  - name: identity-latency
    service: identity
    description: "Identity/auth service latency"
    sli:
      type: latency
      metric: |
        histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="identity"}[5m])) by (le))
    objective_ms: 300  # p95 latency < 300ms
    window: 30d
