apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: khushfus
resources:
  - namespace.yaml
  - configmap.yaml
  # secrets.yaml removed — secrets should be managed externally (e.g., Sealed Secrets, SOPS, or a secrets manager)
  - infrastructure/postgres.yaml
  - infrastructure/redis.yaml
  - infrastructure/elasticsearch.yaml
  - services/gateway.yaml
  - services/core.yaml
  - services/enterprise.yaml
  - services/parity.yaml
  - services/differentiation.yaml
  - services/frontend.yaml
  - ingress.yaml
  - hpa.yaml
  - pdb.yaml
  - network-policies.yaml
  - backup-cronjob.yaml
  - resource-quota.yaml
  - pod-security.yaml

# 7.22 Image tag management via kustomize
images:
  - name: registry.gitlab.com/khushfus/khushfus/gateway
    newTag: "${IMAGE_TAG}"
  - name: registry.gitlab.com/khushfus/khushfus/collector
    newTag: "${IMAGE_TAG}"
  - name: registry.gitlab.com/khushfus/khushfus/analyzer
    newTag: "${IMAGE_TAG}"
  - name: registry.gitlab.com/khushfus/khushfus/query
    newTag: "${IMAGE_TAG}"
  - name: registry.gitlab.com/khushfus/khushfus/report
    newTag: "${IMAGE_TAG}"
  - name: registry.gitlab.com/khushfus/khushfus/notification
    newTag: "${IMAGE_TAG}"
  - name: registry.gitlab.com/khushfus/khushfus/identity
    newTag: "${IMAGE_TAG}"
  - name: registry.gitlab.com/khushfus/khushfus/tenant
    newTag: "${IMAGE_TAG}"
  - name: registry.gitlab.com/khushfus/khushfus/media
    newTag: "${IMAGE_TAG}"
  - name: registry.gitlab.com/khushfus/khushfus/search
    newTag: "${IMAGE_TAG}"
  - name: registry.gitlab.com/khushfus/khushfus/publishing
    newTag: "${IMAGE_TAG}"
  - name: registry.gitlab.com/khushfus/khushfus/rate-limiter
    newTag: "${IMAGE_TAG}"
  - name: registry.gitlab.com/khushfus/khushfus/enrichment
    newTag: "${IMAGE_TAG}"
  - name: registry.gitlab.com/khushfus/khushfus/export
    newTag: "${IMAGE_TAG}"
  - name: registry.gitlab.com/khushfus/khushfus/competitive
    newTag: "${IMAGE_TAG}"
  - name: registry.gitlab.com/khushfus/khushfus/scheduler
