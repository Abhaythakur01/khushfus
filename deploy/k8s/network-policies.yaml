# =============================================================================
# KhushFus Network Policies
# =============================================================================
# Restricts network traffic between pods using Kubernetes NetworkPolicy.
# Requires a CNI plugin that supports NetworkPolicy (e.g., Calico, Cilium).
# =============================================================================

# -----------------------------------------------------------------------------
# Default: Deny all ingress traffic in the namespace
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: khushfus
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# -----------------------------------------------------------------------------
# Default: Deny all egress traffic in the namespace
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: khushfus
spec:
  podSelector: {}
  policyTypes:
    - Egress

---
# -----------------------------------------------------------------------------
# Allow external traffic to gateway (from ingress controller)
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-gateway
  namespace: khushfus
spec:
  podSelector:
    matchLabels:
      app: gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000

---
# -----------------------------------------------------------------------------
# Allow external traffic to frontend (from ingress controller)
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-frontend
  namespace: khushfus
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000

---
# -----------------------------------------------------------------------------
# Allow gateway to reach all backend services
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-backends
  namespace: khushfus
spec:
  podSelector:
    matchLabels:
      tier: backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: gateway
      ports:
        - protocol: TCP
          port: 8010
        - protocol: TCP
          port: 8011
        - protocol: TCP
          port: 8012
        - protocol: TCP
          port: 8013
        - protocol: TCP
          port: 8014
        - protocol: TCP
          port: 8015
        - protocol: TCP
          port: 8016
        - protocol: TCP
          port: 8017
        - protocol: TCP
          port: 8018
        - protocol: TCP
          port: 8019
        - protocol: TCP
          port: 8020

---
# -----------------------------------------------------------------------------
# Allow backend services to reach Postgres
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backends-to-postgres
  namespace: khushfus
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: tier
                operator: In
                values: ["backend", "consumer"]
        - podSelector:
            matchLabels:
              app: gateway
      ports:
        - protocol: TCP
          port: 5432

---
# -----------------------------------------------------------------------------
# Allow backend services to reach Redis
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backends-to-redis
  namespace: khushfus
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: tier
                operator: In
                values: ["backend", "consumer"]
        - podSelector:
            matchLabels:
              app: gateway
      ports:
        - protocol: TCP
          port: 6379

---
# -----------------------------------------------------------------------------
# Allow backend services to reach OpenSearch
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backends-to-opensearch
  namespace: khushfus
spec:
  podSelector:
    matchLabels:
      app: opensearch
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: tier
                operator: In
                values: ["backend", "consumer"]
        - podSelector:
            matchLabels:
              app: gateway
      ports:
        - protocol: TCP
          port: 9200

---
# -----------------------------------------------------------------------------
# Allow Prometheus to scrape metrics from all services
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scraping
  namespace: khushfus
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 8010
        - protocol: TCP
          port: 8011
        - protocol: TCP
          port: 8012
        - protocol: TCP
          port: 8013
        - protocol: TCP
          port: 8014
        - protocol: TCP
          port: 8015
        - protocol: TCP
          port: 8016
        - protocol: TCP
          port: 8017
        - protocol: TCP
          port: 8018
        - protocol: TCP
          port: 8019
        - protocol: TCP
          port: 8020
