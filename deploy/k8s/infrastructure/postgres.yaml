# =============================================================================
# PostgreSQL — Single-node for dev/staging
# =============================================================================
# PRODUCTION HA OPTIONS (choose one):
#   1. CloudNativePG Operator (recommended):
#      - kubectl apply -f https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/main/releases/cnpg-1.22.yaml
#      - Replace this StatefulSet with a CloudNativePG Cluster resource
#      - Provides automated failover, backups to S3, rolling updates
#   2. Patroni + Spilo:
#      - Use Zalando postgres-operator for automated HA with Patroni
#   3. Managed service:
#      - AWS RDS Multi-AZ / GCP Cloud SQL HA / Azure Database for PostgreSQL
#      - Remove this StatefulSet entirely; update DATABASE_URL in secrets
# =============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: khushfus
  labels:
    app: postgres
    tier: infrastructure
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        tier: infrastructure
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: khushfus
            - name: POSTGRES_USER
              value: khushfus
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: khushfus-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - khushfus
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - khushfus
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: khushfus
  labels:
    app: postgres
    tier: infrastructure
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
