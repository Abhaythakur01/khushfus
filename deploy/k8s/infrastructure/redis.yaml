# =============================================================================
# Redis — Single-node for dev/staging
# =============================================================================
# PRODUCTION HA OPTIONS (choose one):
#   1. Redis Sentinel (built-in):
#      - Deploy 3 Sentinel pods + 3 Redis pods (1 master + 2 replicas)
#      - Use Bitnami Redis Helm chart: helm install redis bitnami/redis --set sentinel.enabled=true
#   2. Redis Cluster:
#      - For >16GB datasets or high write throughput
#      - helm install redis bitnami/redis-cluster --set cluster.nodes=6
#   3. Managed service:
#      - AWS ElastiCache / GCP Memorystore / Azure Cache for Redis
#      - Remove this Deployment entirely; update REDIS_URL in secrets
#
# NOTE: When using Sentinel, update REDIS_URL to use sentinel:// scheme
# and configure the application's Redis client for Sentinel discovery.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: khushfus
  labels:
    app: redis
    tier: infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        tier: infrastructure
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
          args:
            - "--appendonly"
            - "yes"
            - "--requirepass"
            - "$(REDIS_PASSWORD)"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: khushfus-secrets
                  key: REDIS_PASSWORD
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
          readinessProbe:
            exec:
              command: ["sh", "-c", "redis-cli -a $REDIS_PASSWORD ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "redis-cli -a $REDIS_PASSWORD ping"]
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: khushfus
  labels:
    app: redis
    tier: infrastructure
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: khushfus
  labels:
    app: redis
    tier: infrastructure
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
