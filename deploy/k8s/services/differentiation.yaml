# Competitive Service - competitive intelligence
apiVersion: apps/v1
kind: Deployment
metadata:
  name: competitive
  namespace: khushfus
  labels:
    app: competitive
    tier: differentiation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: competitive
  template:
    metadata:
      labels:
        app: competitive
        tier: differentiation
    spec:
      containers:
        - name: competitive
          image: registry.gitlab.com/khushfus/khushfus/competitive:REPLACE_WITH_TAG
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 8016
          envFrom:
            - configMapRef:
                name: khushfus-config
            - secretRef:
                name: khushfus-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8016
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8016
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: competitive
  namespace: khushfus
  labels:
    app: competitive
    tier: differentiation
spec:
  selector:
    app: competitive
  ports:
    - port: 8016
      targetPort: 8016
  type: ClusterIP
---
