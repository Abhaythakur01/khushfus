apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: khushfus
  labels:
    app: gateway
    tier: core
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
        tier: core
    spec:
      containers:
        - name: gateway
          image: registry.gitlab.com/khushfus/khushfus/gateway:REPLACE_WITH_TAG
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: khushfus-config
            - secretRef:
                name: khushfus-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: khushfus
  labels:
    app: gateway
    tier: core
spec:
  selector:
    app: gateway
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gateway-pdb
  namespace: khushfus
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: gateway
