# Collector - background worker for data collection
apiVersion: apps/v1
kind: Deployment
metadata:
  name: collector
  namespace: khushfus
  labels:
    app: collector
    tier: core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: collector
  template:
    metadata:
      labels:
        app: collector
        tier: core
    spec:
      containers:
        - name: collector
          image: registry.gitlab.com/khushfus/khushfus/collector:latest
          envFrom:
            - configMapRef:
                name: khushfus-config
            - secretRef:
                name: khushfus-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
---
