# Collector - background worker for data collection
apiVersion: apps/v1
kind: Deployment
metadata:
  name: collector
  namespace: khushfus
  labels:
    app: collector
    tier: core
spec:
  replicas: 1
  # 7.19 Rolling update strategy for single-replica services
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: collector
  template:
    metadata:
      labels:
        app: collector
        tier: core
    spec:
      # 7.17 Pod security context
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: collector
          image: registry.gitlab.com/khushfus/khushfus/collector:REPLACE_WITH_TAG
          # 7.17 Container security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: khushfus-config
            - secretRef:
                name: khushfus-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
          # 7.18 TCP liveness probe for consumer service
          ports:
            - containerPort: 9092
              name: health
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            tcpSocket:
              port: 9092
            failureThreshold: 10
            periodSeconds: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
# Analyzer - background worker for sentiment analysis (ML workload)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analyzer
  namespace: khushfus
  labels:
    app: analyzer
    tier: core
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: analyzer
  template:
    metadata:
      labels:
        app: analyzer
        tier: core
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: analyzer
          image: registry.gitlab.com/khushfus/khushfus/analyzer:REPLACE_WITH_TAG
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: khushfus-config
            - secretRef:
                name: khushfus-secrets
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          ports:
            - containerPort: 9091
              name: health
          livenessProbe:
            tcpSocket:
              port: 9091
            initialDelaySeconds: 45
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            tcpSocket:
              port: 9091
            failureThreshold: 15
            periodSeconds: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: model-cache
              mountPath: /home/appuser/.cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: model-cache
          emptyDir: {}
