# Publishing Service - social media publishing
apiVersion: apps/v1
kind: Deployment
metadata:
  name: publishing
  namespace: khushfus
  labels:
    app: publishing
    tier: parity
spec:
  replicas: 1
  selector:
    matchLabels:
      app: publishing
  template:
    metadata:
      labels:
        app: publishing
        tier: parity
    spec:
      containers:
        - name: publishing
          image: registry.gitlab.com/khushfus/khushfus/publishing:REPLACE_WITH_TAG
          ports:
            - containerPort: 8013
          envFrom:
            - configMapRef:
                name: khushfus-config
            - secretRef:
                name: khushfus-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8013
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8013
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: publishing
  namespace: khushfus
  labels:
    app: publishing
    tier: parity
spec:
  selector:
    app: publishing
  ports:
    - port: 8013
      targetPort: 8013
  type: ClusterIP
