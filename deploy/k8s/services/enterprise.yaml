# Identity Service - authentication and authorization
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity
  namespace: khushfus
  labels:
    app: identity
    tier: enterprise
spec:
  replicas: 2
  selector:
    matchLabels:
      app: identity
  template:
    metadata:
      labels:
        app: identity
        tier: enterprise
    spec:
      containers:
        - name: identity
          image: registry.gitlab.com/khushfus/khushfus/identity:REPLACE_WITH_TAG
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 8010
          envFrom:
            - configMapRef:
                name: khushfus-config
            - secretRef:
                name: khushfus-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: identity
  namespace: khushfus
  labels:
    app: identity
    tier: enterprise
spec:
  selector:
    app: identity
  ports:
    - port: 8010
      targetPort: 8010
  type: ClusterIP
---
